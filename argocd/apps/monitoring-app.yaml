apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hackonomics-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave 1: monitoring deploys after infra (wave 0) so Prometheus Operator
    # CRDs exist before app-namespace ServiceMonitors are evaluated.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  sources:
    # kube-prometheus-stack: Prometheus + Grafana + Alertmanager
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: ">=58.0.0 <60.0.0"
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/argocd/values/kube-prometheus-stack-k3s-dev.yaml

    # Loki: log aggregation (single-binary, filesystem storage, no S3)
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: ">=6.0.0 <7.0.0"
      helm:
        releaseName: loki
        valueFiles:
          - $values/argocd/values/loki-k3s-dev.yaml

    # Values reference — resolves $values to this repo at targetRevision: dev.
    - repoURL: https://github.com/syjoe02/Hackonomics-Infra.git
      targetRevision: dev
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
    - group: monitoring.coreos.com
      kind: Prometheus
      jsonPointers:
        - /status
    - group: monitoring.coreos.com
      kind: Alertmanager
      jsonPointers:
        - /status
