# K3s development overrides for the hackonomics-kotlin chart.
# SECURITY: This file is committed to git — MUST NOT contain real secrets.
# Image tags injected by Skaffold via setValueTemplates.

# Ensures the Service/Deployment name is hackonomics-backend-kotlin regardless
# of the Helm release name used during `skaffold dev`.
fullnameOverride: hackonomics-backend-kotlin

app:
  image:
    repository: k3d-hackonomics-registry:5001/backend-kotlin
    pullPolicy: Always
  existingSecret: hackonomics-kotlin-env

hpa:
  enabled: false
  minReplicas: 1
