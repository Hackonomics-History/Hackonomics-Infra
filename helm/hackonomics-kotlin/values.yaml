app:
  image:
    repository: k3d-hackonomics-registry:5001/backend-kotlin
    tag: "latest"
    pullPolicy: IfNotPresent
  httpPort: 8080
  # REQUIRED in env-specific values — override with real values
  existingSecret: ""
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Points to postgres-django ClusterIP (release name "hackonomics" prefix).
postgres:
  host: hackonomics-postgres-django
  port: "5432"
  database: myeconocoach
  user: econ_user
  # REQUIRED — override in environment-specific values file
  password: "CHANGE_ME_postgres_django_password"

redis:
  url: "redis://hackonomics-redis-django:6379/0"

kafka:
  bootstrapServers: hackonomics-kafka:9092

# JWKS from Hydra public endpoint — NOT Central-auth (Hydra issues tokens).
security:
  jwksUrl: "http://hackonomics-hydra:4444/.well-known/jwks.json"
  jwtIssuer: "http://hackonomics-hydra:4444"

# FastAPI AI service gRPC target
aiService:
  grpcTarget: hackonomics-backend-fastapi:50052

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

appServiceMonitor:
  interval: "30s"
  scrapeTimeout: "10s"
  metricsPath: /actuator/prometheus
  additionalLabels:
    release: hackonomics
