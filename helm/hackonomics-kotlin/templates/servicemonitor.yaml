apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "hackonomics-kotlin.fullname" . }}
  labels:
    {{- include "hackonomics-kotlin.labels" . | nindent 4 }}
    {{- with .Values.appServiceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "hackonomics-kotlin.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.appServiceMonitor.metricsPath }}
      interval: {{ .Values.appServiceMonitor.interval }}
      scrapeTimeout: {{ .Values.appServiceMonitor.scrapeTimeout }}
