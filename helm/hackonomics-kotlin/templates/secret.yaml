{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hackonomics-kotlin.fullname" . }}
  labels:
    {{- include "hackonomics-kotlin.labels" . | nindent 4 }}
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: {{ printf "jdbc:postgresql://%s:%s/%s" .Values.postgres.host .Values.postgres.port .Values.postgres.database | quote }}
  SPRING_DATASOURCE_USERNAME: {{ required "postgres.user is required" .Values.postgres.user | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  SPRING_REDIS_URL: {{ required "redis.url is required" .Values.redis.url | quote }}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ required "kafka.bootstrapServers is required" .Values.kafka.bootstrapServers | quote }}
  SECURITY_JWT_JWKS_URL: {{ required "security.jwksUrl is required" .Values.security.jwksUrl | quote }}
  SECURITY_JWT_ISSUER: {{ required "security.jwtIssuer is required" .Values.security.jwtIssuer | quote }}
  AI_SERVICE_GRPC_TARGET: {{ required "aiService.grpcTarget is required" .Values.aiService.grpcTarget | quote }}
{{- end }}
