{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hackonomics-app.fullname" . }}
  labels:
    {{- include "hackonomics-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Web pods connect via pgBouncer sidecar at localhost:6432.
  DATABASE_URL: {{ printf "postgresql://%s:%s@localhost:%s/%s"
    (required "postgres.user is required" .Values.postgres.user)
    (required "postgres.password is required" .Values.postgres.password)
    (toString .Values.pgbouncer.listenPort)
    (required "postgres.database is required" .Values.postgres.database) | quote }}
  # Worker/beat pods have no pgBouncer sidecar — they override DATABASE_URL with this.
  DATABASE_URL_DIRECT: {{ printf "postgresql://%s:%s@%s:%s/%s"
    .Values.postgres.user
    .Values.postgres.password
    .Values.postgres.host
    .Values.postgres.port
    .Values.postgres.database | quote }}
  REDIS_URL: {{ required "redis.url is required" .Values.redis.url | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ required "kafka.bootstrapServers is required" .Values.kafka.bootstrapServers | quote }}
  SENTRY_DSN: {{ required "app.sentryDsn is required" .Values.app.sentryDsn | quote }}
  DJANGO_SECRET_KEY: {{ required "app.djangoSecretKey is required" .Values.app.djangoSecretKey | quote }}
  DJANGO_ALLOWED_HOSTS: {{ .Values.app.allowedHosts | quote }}
  DEBUG: {{ .Values.app.debug | quote }}
{{- end }}
