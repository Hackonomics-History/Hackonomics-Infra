apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "central-auth.fullname" . }}-pgbouncer
  labels:
    {{- include "central-auth.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    {{ .Values.postgres.database }} = host={{ .Values.postgres.host }} port={{ .Values.postgres.port }} dbname={{ .Values.postgres.database }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = {{ .Values.pgbouncer.listenPort }}
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    ignore_startup_parameters = extra_float_digits
    admin_users = {{ .Values.postgres.user }}

  userlist.txt: |
    "{{ .Values.postgres.user }}" "{{ .Values.postgres.password }}"
