{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hackonomics-fastapi.fullname" . }}
  labels:
    {{- include "hackonomics-fastapi.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s"
    (required "postgres.user is required" .Values.postgres.user)
    (required "postgres.password is required" .Values.postgres.password)
    .Values.postgres.host
    .Values.postgres.port
    (required "postgres.database is required" .Values.postgres.database) | quote }}
  JWKS_URL: {{ required "security.jwksUrl is required" .Values.security.jwksUrl | quote }}
  JWT_ISSUER: {{ required "security.jwtIssuer is required" .Values.security.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.security.jwtAudience | quote }}
  QDRANT_URL: {{ required "qdrant.url is required" .Values.qdrant.url | quote }}
  QDRANT_COLLECTION: {{ .Values.qdrant.collection | quote }}
  REDIS_URL: {{ required "redis.url is required" .Values.redis.url | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ required "kafka.bootstrapServers is required" .Values.kafka.bootstrapServers | quote }}
  KAFKA_NEWS_REFRESH_REQUEST_TOPIC: {{ .Values.kafka.newsRefreshRequestTopic | quote }}
  KAFKA_NEWS_REFRESH_RESULT_TOPIC: {{ .Values.kafka.newsRefreshResultTopic | quote }}
  KAFKA_CONSUMER_GROUP_ID: {{ .Values.kafka.consumerGroupId | quote }}
  GRPC_PORT: {{ .Values.app.grpcPort | quote }}
  GEMINI_API_KEY: {{ required "app.geminiApiKey is required" .Values.app.geminiApiKey | quote }}
  INTERNAL_AI_TOKEN: {{ required "app.internalAiToken is required" .Values.app.internalAiToken | quote }}
  GOOGLE_CLIENT_ID: {{ required "app.googleClientId is required" .Values.app.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ required "app.googleClientSecret is required" .Values.app.googleClientSecret | quote }}
  GOOGLE_CALENDAR_REDIRECT_URI: {{ .Values.app.googleCalendarRedirectUri | quote }}
{{- end }}
