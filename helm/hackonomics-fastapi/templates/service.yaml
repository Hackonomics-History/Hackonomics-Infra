apiVersion: v1
kind: Service
metadata:
  name: {{ include "hackonomics-fastapi.fullname" . }}
  labels:
    {{- include "hackonomics-fastapi.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "hackonomics-fastapi.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.app.grpcPort }}
      targetPort: grpc
      protocol: TCP
