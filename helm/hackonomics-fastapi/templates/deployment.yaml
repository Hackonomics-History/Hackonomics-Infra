apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hackonomics-fastapi.fullname" . }}
  labels:
    {{- include "hackonomics-fastapi.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.hpa.minReplicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hackonomics-fastapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "hackonomics-fastapi.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend-fastapi
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.httpPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.app.grpcPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ default (include "hackonomics-fastapi.fullname" .) .Values.app.existingSecret }}
          # fastembed model loading takes 30-60 s on first start
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
