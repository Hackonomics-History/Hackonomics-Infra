{{- $ns := .Values.namespace }}
{{- $ri := .Values.refreshInterval }}
{{- $secrets := list
  (dict "name" "hackonomics-auth-env"    "kvPath" "hackonomics/auth")
  (dict "name" "hackonomics-django-env"  "kvPath" "hackonomics/django")
  (dict "name" "hackonomics-infra-env"   "kvPath" "hackonomics/infra")
  (dict "name" "hackonomics-shared-env"  "kvPath" "hackonomics/shared")
}}
{{- range $secrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
spec:
  refreshInterval: {{ $ri | quote }}
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: {{ .name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .kvPath | quote }}
{{- end }}
