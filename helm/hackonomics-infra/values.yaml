# Default values for hackonomics-infra umbrella chart.
# Override per environment with values-k3s-dev.yaml etc.

postgres-go:
  postgres:
    database: central_auth
    user: central_auth
    # REQUIRED — override in environment-specific values file
    password: "CHANGE_ME_postgres_go_password"
  storage:
    size: 5Gi
    storageClass: local-path
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

postgres-django:
  postgres:
    database: hackonomics
    user: hackonomics
    # REQUIRED — override in environment-specific values file
    password: "CHANGE_ME_postgres_django_password"
  storage:
    size: 5Gi
    storageClass: local-path
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis-go:
  storage:
    size: 2Gi
    storageClass: local-path
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

redis-django:
  storage:
    size: 2Gi
    storageClass: local-path
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

kafka:
  # REQUIRED — generate with: kafka-storage random-uuid
  clusterId: "CHANGE_ME_kafka_cluster_id"
  storage:
    size: 10Gi
    storageClass: local-path
  image:
    repository: confluentinc/cp-kafka
    tag: "7.9.0"
    pullPolicy: IfNotPresent
  service:
    internalPort: 9092
    controllerPort: 9093
    externalPort: 19092
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  topics:
    - name: access-logs
      partitions: 3
      replicationFactor: 1
    - name: user-activities
      partitions: 3
      replicationFactor: 1
    - name: user-activities.retry-1
      partitions: 3
      replicationFactor: 1
      retentionMs: "86400000"
    - name: user-activities.retry-2
      partitions: 3
      replicationFactor: 1
      retentionMs: "259200000"
    - name: user-activities.dlt
      partitions: 3
      replicationFactor: 1
      retentionMs: "604800000"
    - name: blacklist-sync
      partitions: 3
      replicationFactor: 1

kratos:
  replicaCount: 1
  dsn: "postgres://kratos:CHANGE_ME_kratos_db_password@hackonomics-postgres-go:5432/kratos?sslmode=disable"
  database:
    cleanup:
      batchSize: 100
      sleepTables: "1m"
      olderThan: "720h"
  serve:
    public:
      baseUrl: "http://hackonomics-kratos:4433/"
      cors:
        allowedOrigins:
          - "*"
    admin:
      baseUrl: "http://hackonomics-kratos:4434/"
  selfservice:
    defaultBrowserReturnUrl: "http://localhost:3000/"
    allowedReturnUrls:
      - "http://localhost:3000"
      - "http://localhost:8081"
    flows:
      error:
        uiUrl: "http://localhost:3000/error"
      settings:
        uiUrl: "http://localhost:3000/settings"
      recovery:
        uiUrl: "http://localhost:3000/recovery"
      verification:
        uiUrl: "http://localhost:3000/verification"
      login:
        uiUrl: "http://localhost:3000/login"
      registration:
        uiUrl: "http://localhost:3000/registration"
  # secrets and OIDC credentials are injected via existingSecret (K8s Secret).
  # Never set cookieSecret, cipherSecret, or Google client IDs in values files.
  secrets: {}
  oidc:
    google: {}
  serviceMonitor:
    enabled: true
    interval: "30s"
    scrapeTimeout: "10s"
    additionalLabels:
      release: hackonomics

promtail:
  loki:
    url: "http://loki:3100/loki/api/v1/push"
    tenantId: "hackonomics"

hydra:
  # Disabled by default — enable when the Kratos consent/login flow is wired up.
  enabled: false
  replicaCount: 1
  image:
    repository: oryd/hydra
    tag: "v2.2.0"
    pullPolicy: IfNotPresent
  # REQUIRED — override with a real password via Sealed Secret or ArgoCD Vault Plugin.
  dsn: "postgres://hydra:CHANGE_ME_hydra_db_password@hackonomics-postgres-go:5432/hydra?sslmode=disable"
  serve:
    public:
      baseUrl: "http://hackonomics-hydra:4444/"
      port: 4444
      corsEnabled: true
      corsAllowedOrigins:
        - "http://localhost:3000"
        - "http://localhost:5173"
    admin:
      baseUrl: "http://hackonomics-hydra:4445/"
      port: 4445
  urls:
    selfIssuer: "http://hackonomics-hydra:4444/"
    consent: "http://hackonomics-kratos:4433/consent"
    login: "http://hackonomics-kratos:4433/login"
    logout: "http://hackonomics-kratos:4433/logout"
    postLogoutRedirect: "http://localhost:3000/"
  existingSecret: ""
  service:
    publicPort: 4444
    adminPort: 4445
  autoMigrate: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Traefik IngressRoute values ───────────────────────────────────────────────
# Service names derive from the release name prefix (e.g. "hackonomics-kratos").
# Django ingress routes are now managed by the hackonomics-app chart.

traefik:
  serviceMonitor:
    enabled: true
    interval: "30s"
    scrapeTimeout: "10s"
    additionalLabels:
      release: hackonomics

# ── Application ServiceMonitors ────────────────────────────────────────────────
# ServiceMonitor resources for app workloads are now managed in their respective
# standalone charts (hackonomics-app and hackonomics-auth).
