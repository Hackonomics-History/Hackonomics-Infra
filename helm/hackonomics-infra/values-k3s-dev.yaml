# K3s development environment overrides for the hackonomics-infra chart (infra only).
# Apply with: helm upgrade --install hackonomics ./helm/hackonomics-infra \
#               -f ./helm/hackonomics-infra/values-k3s-dev.yaml
#
# SECURITY: This file is committed to git — it MUST NOT contain real secrets.
# Credential fields are injected at deploy time via K8s Secrets created by
# setup-secrets.sh. Only non-sensitive overrides live here.
#
# App charts (hackonomics-app, hackonomics-auth) have their own values-k3s-dev.yaml
# files co-located in helm/hackonomics-app/ and helm/hackonomics-auth/.

postgres-go:
  # Pre-created by setup-secrets.sh from .env.shared + Hackonomics-Infra/env/.env.prod
  existingSecret: hackonomics-auth-env
  persistence:
    enabled: false

postgres-app:
  # Synced from secret/hackonomics/infra by ESO → hackonomics-infra-env.
  # infra/.env.local must include POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB.
  existingSecret: hackonomics-infra-env
  persistence:
    enabled: false

redis-go:
  # Pre-created by setup-secrets.sh from .env.shared + Hackonomics-Infra/env/.env.prod
  existingSecret: hackonomics-auth-env
  persistence:
    enabled: false

redis-app:
  # Pre-created by setup-secrets.sh from .env.shared + Hackonomics-Infra/env/.env.prod
  existingSecret: hackonomics-infra-env
  persistence:
    enabled: false

# Kafka clusterId must be stable across restarts — generate once with:
#   kubectl exec -it <kafka-pod> -- kafka-storage random-uuid
# and commit the result here (it is not a secret).
kafka:
  clusterId: "442lPRE1TBG-csdKDvfRvQ"
  # Use the full service FQDN so advertised.listeners is always routable,
  # even from other namespaces. Short name "hackonomics-kafka" also works
  # within the same namespace, but the FQDN avoids ambiguity in k3d/k3s.
  advertisedHost: "hackonomics-kafka.hackonomics.svc.cluster.local"
  persistence:
    enabled: false

kratos:
  # Pre-created by setup-secrets.sh from .env.shared + Hackonomics-Infra/env/.env.prod
  existingSecret: hackonomics-auth-env
  dbSecretName: hackonomics-auth-env

promtail:
  # Point at the Loki service deployed by setup-infra.sh into the monitoring namespace.
  # Tenant must match loki-rules.yaml and Prometheus remote-write config.
  loki:
    url: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
    tenantId: "hackonomics"

hydra:
  enabled: true
  # Pre-created by setup-secrets.sh from .env.shared + Hackonomics-Infra/env/.env.prod
  existingSecret: hackonomics-auth-env

qdrant:
  enabled: true
  persistence:
    enabled: false
