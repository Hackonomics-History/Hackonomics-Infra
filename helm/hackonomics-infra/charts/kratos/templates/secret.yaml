apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kratos.fullname" . }}-secrets
  labels:
    {{- include "kratos.labels" . | nindent 4 }}
type: Opaque
stringData:
  KRATOS_COOKIE_SECRET: {{ required | .Values.secrets.cookieSecret | quote }}
  KRATOS_CIPHER_SECRET: {{ required | .Values.secrets.cipherSecret | quote }}
  SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_ID: {{ .Values.oidc.google.clientId | quote }}
  SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_SECRET: {{ .Values.oidc.google.clientSecret | quote }}
