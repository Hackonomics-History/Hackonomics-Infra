{{- if not .Values.existingSecret }}
{{- $cookieSecret := .Values.secrets.cookieSecret | default "" }}
{{- $cipherSecret := .Values.secrets.cipherSecret | default "" }}
{{- if or $cookieSecret $cipherSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kratos.fullname" . }}-secrets
  labels:
    {{- include "kratos.labels" . | nindent 4 }}
type: Opaque
stringData:
  KRATOS_COOKIE_SECRET: {{ required "secrets.cookieSecret is required when existingSecret is not set" $cookieSecret | quote }}
  KRATOS_CIPHER_SECRET: {{ required "secrets.cipherSecret is required when existingSecret is not set" $cipherSecret | quote }}
  SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_ID: {{ .Values.oidc.google.clientId | default "" | quote }}
  SELFSERVICE_METHODS_OIDC_CONFIG_PROVIDERS_0_CLIENT_SECRET: {{ .Values.oidc.google.clientSecret | default "" | quote }}
{{- end }}
{{- end }}
