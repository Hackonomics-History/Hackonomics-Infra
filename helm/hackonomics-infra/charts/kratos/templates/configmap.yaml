apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kratos.fullname" . }}-config
  labels:
    {{- include "kratos.labels" . | nindent 4 }}
data:
  kratos.yml: |
    version: v0.13.0

    dsn: {{ .Values.dsn | quote }}

    database:
      cleanup:
        batch_size: {{ .Values.database.cleanup.batchSize | default 100 }}
        sleep:
          tables: {{ .Values.database.cleanup.sleepTables | default "1m" }}
        older_than: {{ .Values.database.cleanup.olderThan | default "720h" }}

    serve:
      public:
        base_url: {{ .Values.serve.public.baseUrl | quote }}
        cors:
          enabled: true
          allowed_origins:
            {{- range .Values.serve.public.cors.allowedOrigins }}
            - {{ . | quote }}
            {{- end }}
          allowed_methods:
            - POST
            - GET
            - PUT
            - PATCH
            - DELETE
          allowed_headers:
            - Authorization
            - Content-Type
          exposed_headers:
            - Content-Type
      admin:
        base_url: {{ .Values.serve.admin.baseUrl | quote }}

    selfservice:
      default_browser_return_url: {{ .Values.selfservice.defaultBrowserReturnUrl | quote }}
      allowed_return_urls:
        {{- range .Values.selfservice.allowedReturnUrls }}
        - {{ . | quote }}
        {{- end }}
      methods:
        password:
          enabled: true
          config:
            min_password_length: 8
            identifier_similarity_check_enabled: true
        oidc:
          enabled: true
          config:
            providers:
              - id: google
                provider: google
                # Injected at runtime from the K8s Secret via envFrom —
                # never written to values files or this ConfigMap as plain text.
                client_id: ${GOOGLE_CLIENT_ID}
                client_secret: ${GOOGLE_CLIENT_SECRET}
                mapper_url: file:///etc/config/kratos/google.mapper.jsonnet
                scope:
                  - email
                  - profile
        profile:
          enabled: true
        link:
          enabled: true
      flows:
        error:
          ui_url: {{ .Values.selfservice.flows.error.uiUrl | quote }}
        settings:
          ui_url: {{ .Values.selfservice.flows.settings.uiUrl | quote }}
          privileged_session_max_age: 15m
        recovery:
          enabled: true
          ui_url: {{ .Values.selfservice.flows.recovery.uiUrl | quote }}
        verification:
          enabled: true
          ui_url: {{ .Values.selfservice.flows.verification.uiUrl | quote }}
          after:
            default_browser_return_url: {{ .Values.selfservice.defaultBrowserReturnUrl | quote }}
        logout:
          after:
            default_browser_return_url: {{ .Values.selfservice.flows.login.uiUrl | quote }}
        login:
          ui_url: {{ .Values.selfservice.flows.login.uiUrl | quote }}
          lifespan: 10m
        registration:
          lifespan: 10m
          ui_url: {{ .Values.selfservice.flows.registration.uiUrl | quote }}
          after:
            oidc:
              hooks:
                - hook: session

    session:
      lifespan: 24h
      cookie:
        persistent: false

    log:
      level: info
      format: json
      leak_sensitive_values: false

    secrets:
      cookie:
        # Injected at runtime from the K8s Secret via envFrom — Kratos expands ${} vars.
        - ${KRATOS_COOKIE_SECRET}
      cipher:
        - ${KRATOS_CIPHER_SECRET}

    ciphers:
      algorithm: xchacha20-poly1305

    hashers:
      algorithm: bcrypt
      bcrypt:
        cost: 12

    identity:
      default_schema_id: person
      schemas:
        - id: person
          url: file:///etc/config/kratos/identity.schema.json

    courier:
      smtp:
        connection_uri: {{ .Values.courier.smtp.connectionUri | quote }}

  # ── OIDC mapper: maps Google Claims → Kratos identity traits ───────────────
  # Sourced from Central-auth/kratos/google.mapper.jsonnet (now consolidated here).
  google.mapper.jsonnet: |
    local claims = {
      email_verified: false,
    } + std.extVar('claims');

    {
      identity: {
        traits: {
          email: claims.email,
          [if 'given_name' in claims then 'name']: {
            first: claims.given_name,
            [if 'family_name' in claims then 'last']: claims.family_name,
          },
        },
      },
    }

  # ── Identity schema: defines the shape of a Kratos person identity ──────────
  # Sourced from Central-auth/kratos/identity.schema.json (now consolidated here).
  identity.schema.json: |
    {
      "$id": "https://schemas.central-auth.local/person.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "Person",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "title": "E-Mail",
              "ory.sh/kratos": {
                "credentials": {
                  "password": {
                    "identifier": true
                  },
                  "webauthn": {
                    "identifier": true
                  },
                  "totp": {
                    "account_name": true
                  }
                },
                "recovery": {
                  "via": "email"
                },
                "verification": {
                  "via": "email"
                }
              },
              "maxLength": 320
            },
            "name": {
              "type": "object",
              "properties": {
                "first": {
                  "type": "string",
                  "title": "First Name",
                  "maxLength": 256
                },
                "last": {
                  "type": "string",
                  "title": "Last Name",
                  "maxLength": 256
                }
              }
            }
          },
          "required": [
            "email"
          ],
          "additionalProperties": false
        }
      }
    }
