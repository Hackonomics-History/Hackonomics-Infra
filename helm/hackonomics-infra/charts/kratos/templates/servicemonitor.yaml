{{- if .Values.serviceMonitor.enabled }}
# ServiceMonitor for Prometheus Operator — enables automatic scraping of Kratos
# metrics from the admin port (/metrics/prometheus) by the existing Prometheus instance.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kratos.fullname" . }}
  labels:
    {{- include "kratos.labels" . | nindent 4 }}
    {{- if .Values.serviceMonitor.additionalLabels }}
    {{- toYaml .Values.serviceMonitor.additionalLabels | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kratos.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: admin
      path: /metrics/prometheus
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
{{- end }}
