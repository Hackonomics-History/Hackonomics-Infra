replicaCount: 1

image:
  repository: oryd/kratos
  tag: "v0.13.0"
  pullPolicy: IfNotPresent

# DSN for Kratos identity database. In production, override via Sealed Secret.
# Uses the postgres-go instance by default (same PG server as central-auth).

database:
  # gobuffalo/pop cleanup settings — controls background stale-record pruning.
  # Connection pool tuning belongs in the DSN URL query params (max_conns, etc.).
  cleanup:
    batchSize: 100
    sleepTables: "1m"
    olderThan: "720h"

serve:
  public:
    baseUrl: "http://kratos:4433/"
    cors:
      allowedOrigins:
        - "http://localhost:5173"
        - "http://localhost:3000"
  admin:
    baseUrl: "http://kratos:4434/"

selfservice:
  defaultBrowserReturnUrl: "http://localhost:3000/"
  allowedReturnUrls:
    - "http://localhost:3000"
    - "http://localhost:8081"
  flows:
    error:
      uiUrl: "http://localhost:3000/error"
    settings:
      uiUrl: "http://localhost:3000/settings"
    recovery:
      uiUrl: "http://localhost:3000/recovery"
    verification:
      uiUrl: "http://localhost:3000/verification"
    login:
      uiUrl: "http://localhost:3000/login"
    registration:
      uiUrl: "http://localhost:3000/registration"

courier:
  smtp:
    connectionUri: "smtps://test:test@mailslurper:1025/?skip_ssl_verify=true"

# secrets and oidc credentials are injected exclusively through K8s Secrets
# (existingSecret) and expanded in kratos.yml via ${ENV_VAR} substitution.
# Do NOT set cookieSecret, cipherSecret, or Google client credentials here —
# they must never appear in committed values files.
secrets: {}
oidc:
  google: {}

# If set, the chart skips creating its own Secret and the Deployment references
# this pre-existing K8s Secret via envFrom. Use with setup-infra.sh.
existingSecret: "hackonomics-auth-env"
dbSecretName: "hackonomics-auth-env"

service:
  publicPort: 4433
  adminPort: 4434

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceMonitor:
  enabled: true
  interval: "30s"
  scrapeTimeout: "10s"
  # Must match labels on the Prometheus Operator's ServiceMonitor selector.
  additionalLabels:
    release: hackonomics
