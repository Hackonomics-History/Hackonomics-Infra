apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-go.fullname" . }}
  labels:
    {{- include "redis-go.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "redis-go.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
      protocol: TCP
