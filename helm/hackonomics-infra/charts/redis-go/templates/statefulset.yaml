apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis-go.fullname" . }}
  labels:
    {{- include "redis-go.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "redis-go.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "redis-go.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis-go.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "redis-go.fullname" . }}-data
