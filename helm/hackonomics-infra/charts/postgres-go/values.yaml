postgres:
  database: central_auth
  user: central_auth
  password: ""

# If set, the chart skips creating its own Secret and the StatefulSet
# references this pre-existing K8s Secret via envFrom. Use with setup-infra.sh.
existingSecret: "hackonomics-auth-env"

storage:
  size: 5Gi
  storageClass: local-path

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  port: 5432

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
