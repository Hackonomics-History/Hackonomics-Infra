{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres-go.fullname" . }}
  labels:
    {{- include "postgres-go.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ required "postgres.database is required" .Values.postgres.database | quote }}
  POSTGRES_USER: {{ required "postgres.user is required" .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required" .Values.postgres.password | quote }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:5432/%s?sslmode=disable"
    .Values.postgres.user
    .Values.postgres.password
    (include "postgres-go.fullname" .)
    .Values.postgres.database | quote }}
{{- end }}
