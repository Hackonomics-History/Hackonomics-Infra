apiVersion: v1
kind: Secret
metadata:
  name: {{ include "central-auth.fullname" . }}
  labels:
    {{- include "central-auth.labels" . | nindent 4 }}
type: Opaque
stringData:
  # App connects to localhost:6432 — pgBouncer sidecar forwards to postgres-go ClusterIP.
  POSTGRES_DSN: {{ printf "postgres://%s:%s@localhost:%s/%s?sslmode=disable"
    (required "postgres.user is required" .Values.postgres.user)
    (required "postgres.password is required" .Values.postgres.password)
    (toString .Values.pgbouncer.listenPort)
    (required "postgres.database is required" .Values.postgres.database) | quote }}
  REDIS_ADDR: {{ required "redis.addr is required" .Values.redis.addr | quote }}
  KAFKA_BROKERS: {{ required "kafka.brokers is required" .Values.kafka.brokers | quote }}
  HTTP_PORT: {{ .Values.app.httpPort | quote }}
  GRPC_PORT: {{ .Values.app.grpcPort | quote }}
  METRICS_PORT: {{ .Values.app.metricsPort | quote }}
  SENTRY_DSN: {{ required "app.sentryDsn is required" .Values.app.sentryDsn | quote }}
  SERVICE_API_KEY: {{ required "app.serviceApiKey is required" .Values.app.serviceApiKey | quote }}
  RATE_LIMIT_REQUESTS_PER_MIN: {{ .Values.app.rateLimitRequestsPerMin | quote }}
