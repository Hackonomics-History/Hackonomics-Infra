apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kafka.fullname" . }}-config
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
data:
  # KRaft env vars for confluentinc/cp-kafka. Use KAFKA_* prefix ONLY.
  # KAFKA_CFG_* is Bitnami-specific and is NOT processed by this image —
  # cp-kafka 7.9.0 (Kafka 3.9.0) will reject unknown properties like
  # "cfg.listeners" that KAFKA_CFG_* would produce.
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "broker,controller"
  CLUSTER_ID: {{ required "clusterId is required — generate with: kafka-storage random-uuid" .Values.clusterId | quote }}

  # Bind listeners to all interfaces; advertised.listeners MUST use a
  # routable DNS name — 0.0.0.0 is not permitted there.
  KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://{{ .Values.advertisedHost | default (printf "%s.%s.svc.cluster.local" (include "kafka.fullname" .) .Release.Namespace) }}:{{ .Values.service.internalPort }}"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  KAFKA_CONTROLLER_QUORUM_VOTERS: {{ printf "1@%s:%d" (include "kafka.pod0DNS" .) (int .Values.service.controllerPort) | quote }}

  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  # Single-node cluster: all replication factors must be 1.
  # Previously these were incorrectly set as KAFKA_CFG_* (Bitnami prefix)
  # and were silently ignored by cp-kafka, leaving the broker with defaults
  # of 3 that cause KRaft startup failures on a single replica.
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
  KAFKA_MIN_INSYNC_REPLICAS: "1"
