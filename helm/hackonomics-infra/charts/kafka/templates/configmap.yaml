apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kafka.fullname" . }}-config
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
data:
  # KRaft environment variables injected into the Kafka container.
  # KAFKA_NODE_ID and KAFKA_PROCESS_ROLES configure this broker as a
  # combined broker+controller node (single-node KRaft mode).
  KAFKA_NODE_ID: "1"
  KAFKA_PROCESS_ROLES: "broker,controller"
  CLUSTER_ID: {{ required "clusterId is required — generate with: kafka-storage random-uuid" .Values.clusterId | quote }}

  # Listeners:
  #   PLAINTEXT  — used by in-cluster clients (services in the same namespace)
  #   CONTROLLER — KRaft raft protocol between controller nodes
  #
  # EXTERNAL listener removed — not needed in a single-node k3d dev cluster.
  # Advertised address is configurable via .Values.advertisedHost (defaults to
  # the chart fullname which resolves to the ClusterIP service DNS name).
  KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"

  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://{{ .Values.advertisedHost | default (include "kafka.fullname" .) }}:{{ .Values.service.internalPort }}"

  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
  KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

  # Single-node KRaft quorum — pod-0 is always the controller.
  KAFKA_CONTROLLER_QUORUM_VOTERS: {{ printf "1@%s:%d" (include "kafka.pod0DNS" .) (int .Values.service.controllerPort) | quote }}

  KAFKA_LOG_DIRS: "/var/lib/kafka/data"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
  KAFKA_MIN_INSYNC_REPLICAS: "1"
