# REQUIRED — generate with: kafka-storage random-uuid
clusterId: "CHANGE_ME_kafka_cluster_id"

storage:
  size: 10Gi
  storageClass: local-path

image:
  repository: confluentinc/cp-kafka
  tag: "7.9.0"
  pullPolicy: IfNotPresent

# Override to set KAFKA_ADVERTISED_LISTENERS host explicitly.
# Defaults to the chart fullname (e.g. "hackonomics-kafka") which resolves
# to the ClusterIP service from within the cluster.
advertisedHost: ""

service:
  internalPort: 9092
  controllerPort: 9093

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

topics:
  - name: access-logs
    partitions: 3
    replicationFactor: 1
  - name: user-activities
    partitions: 3
    replicationFactor: 1
  - name: user-activities.retry-1
    partitions: 3
    replicationFactor: 1
    retentionMs: "86400000"
  - name: user-activities.retry-2
    partitions: 3
    replicationFactor: 1
    retentionMs: "259200000"
  - name: user-activities.dlt
    partitions: 3
    replicationFactor: 1
    retentionMs: "604800000"
