postgres:
  database: hackonomics
  user: hackonomics
  password: "CHANGE_ME_postgres_django_password"

storage:
  size: 5Gi
  storageClass: local-path

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  port: 5432

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
