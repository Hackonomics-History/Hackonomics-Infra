apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres-django.fullname" . }}
  labels:
    {{- include "postgres-django.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgres-django.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgres-django.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgres-django.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "postgres-django.fullname" . }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.user }}
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "postgres-django.fullname" . }}-data
