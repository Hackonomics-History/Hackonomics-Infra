apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres-django.fullname" . }}
  labels:
    {{- include "postgres-django.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "postgres-django.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.service.port }}
      targetPort: postgres
      protocol: TCP
