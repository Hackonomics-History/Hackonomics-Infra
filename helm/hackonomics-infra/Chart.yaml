apiVersion: v2
name: hackonomics-infra
description: Umbrella chart for Hackonomics-2026 stateful infrastructure (K3s)
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  - name: postgres-go
    version: 0.1.0
    repository: "file://charts/postgres-go"
  - name: postgres-app
    version: 0.1.0
    repository: "file://charts/postgres-app"
  - name: redis-go
    version: 0.1.0
    repository: "file://charts/redis-go"
  - name: redis-app
    version: 0.1.0
    repository: "file://charts/redis-app"
  - name: kafka
    version: 0.1.0
    repository: "file://charts/kafka"
  - name: kratos
    version: 0.1.0
    repository: "file://charts/kratos"
  - name: hydra
    version: 0.1.0
    repository: "file://charts/hydra"
    condition: hydra.enabled
  - name: qdrant
    version: 0.1.0
    repository: "file://charts/qdrant"
    condition: qdrant.enabled
  - name: promtail
    version: 0.1.0
    repository: "file://charts/promtail"
