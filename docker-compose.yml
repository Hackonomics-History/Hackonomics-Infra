services:
  # Generates /cfg/prometheus.yml from prometheus.yml.tmpl + env vars at every
  # docker compose up, so credential rotation requires no manual file editing.
  prometheus-config-init:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.envsubst
    container_name: prometheus-config-init
    env_file:
      - ./env/.env.prod
    volumes:
      - ./monitoring/prometheus.yml.tmpl:/tmpl/prometheus.yml.tmpl:ro
      - prometheus-config:/cfg
    command: >
      sh -c "envsubst < /tmpl/prometheus.yml.tmpl > /cfg/prometheus.yml &&
             echo '[OK] prometheus.yml generated'"
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    env_file:
      - ./env/.env.prod
    depends_on:
      prometheus-config-init:
        condition: service_completed_successfully
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - prometheus-config:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - shared-monitor-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    env_file:
      - ./env/.env.prod
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    networks:
      - shared-monitor-net
    restart: unless-stopped
    stop_grace_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka
    hostname: kafka
    env_file:
      - ./env/.env.prod
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    ports:
      - "19092:19092"   # EXTERNAL listener — host tooling only
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - shared-monitor-net
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-setup:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - shared-monitor-net
    restart: "no"
    command:
      - sh
      - -c
      - |
        echo '[kafka-setup] Creating topic: access-logs' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic access-logs --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --describe --topic access-logs &&
        echo '[kafka-setup] Creating topic: user-activities' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-activities --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --describe --topic user-activities &&
        echo '[kafka-setup] Creating topic: user-activities.retry-1' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-activities.retry-1 --partitions 3 --replication-factor 1 --config retention.ms=86400000 &&
        echo '[kafka-setup] Creating topic: user-activities.retry-2' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-activities.retry-2 --partitions 3 --replication-factor 1 --config retention.ms=259200000 &&
        echo '[kafka-setup] Creating topic: user-activities.dlt' &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-activities.dlt --partitions 3 --replication-factor 1 --config retention.ms=604800000 &&
        echo '[kafka-setup] Done.'

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
      - --kafka.version=3.7.0
      - --log.level=warn
    ports:
      - "9308:9308"   # Prometheus scrapes via Docker network; host port for ad-hoc curl
    networks:
      - shared-monitor-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9308/metrics"]
      interval: 20s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: hackonomics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - shared-monitor-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

networks:
  shared-monitor-net:
    external: true

volumes:
  prometheus-config:
  prometheus-data:
  grafana-data:
  kafka-data:
