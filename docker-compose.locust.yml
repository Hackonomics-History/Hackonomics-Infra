services:
  locust-master:
    build:
      context: ./loadtest
      dockerfile: Dockerfile
    command: >
      locust
      --master
      --host=${LOCUST_HOST:-http://host.docker.internal:8000}
      --users=${LOCUST_USERS:-1000}
      --spawn-rate=${LOCUST_SPAWN_RATE:-50}
      --run-time=${LOCUST_RUN_TIME:-10m}
    ports:
      - "8089:8089" # Locust web UI
      - "5557:5557" # Worker communication
    volumes:
      - ./loadtest:/app
    environment:
      - LOCUST_HOST=${LOCUST_HOST:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - locust-net
      - shared-monitor-net

  locust-worker:
    build:
      context: ./loadtest
      dockerfile: Dockerfile
    command: >
      locust
      --worker
      --master-host=locust-master
    volumes:
      - ./loadtest:/app
    environment:
      - LOCUST_HOST=${LOCUST_HOST:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - locust-master
    networks:
      - locust-net
      - shared-monitor-net
    deploy:
      replicas: ${LOCUST_WORKERS:-4}

  locust-exporter:
    image: containersol/locust_exporter:latest
    container_name: locust-exporter
    command:
      - --locust.uri=http://locust-master:8089
    ports:
      - "9646:9646" # Prometheus scrapes via shared-monitor-net; host port for ad-hoc curl
    networks:
      - locust-net
      - shared-monitor-net
    depends_on:
      - locust-master
    restart: unless-stopped

networks:
  locust-net:
    driver: bridge
  shared-monitor-net:
    external: true
